<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Escolha a versão</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    a {
      display: block;
      margin: 1rem 0;
      padding: 1rem;
      text-decoration: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      transition: 0.2s;
    }
    a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Escolha a versão do portfólio</h1>

    <a href="bootstrap/src/index.html">
      Versão com Bootstrap
    </a>

    <a href="tailwind/src/index.html">
      Versão com Tailwind
    </a>
  </main>
</body>
</html>
